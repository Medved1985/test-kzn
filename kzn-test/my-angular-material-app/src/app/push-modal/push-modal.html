<h2 mat-dialog-title>Отправка PUSH-сообщения</h2>

<div mat-dialog-content>
  <p class="clients-count">
    Выбрано клиентов: {{ data.clients.length }}
  </p>
</div>

<div mat-dialog-actions>
  <button mat-button (click)="onCancel()">Отмена</button>
  <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="pushForm.invalid">
    Отправить
  </button>
</div>
